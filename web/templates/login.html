<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ورود | Atlas Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Vazirmatn',sans-serif;
  background:
    linear-gradient(135deg,rgba(79,70,229,.10),transparent 34%),
    linear-gradient(315deg,rgba(16,185,129,.10),transparent 32%),
    #f5f7fb;
  color:#172033;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;padding:18px;
}
body::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(15,23,42,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.04) 1px,transparent 1px);
  background-size:34px 34px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.72),transparent 76%);
}
.login-box{
  background:rgba(255,255,255,.90);
  border:1px solid rgba(226,232,240,.95);
  border-radius:8px;padding:34px 30px;
  width:min(380px,100%);position:relative;z-index:1;
  box-shadow:0 24px 70px rgba(15,23,42,.14);
  backdrop-filter:blur(18px);
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

.logo{text-align:center;margin-bottom:32px}
.logo-icon{
  width:58px;height:58px;
  background:#111827;color:#fff;
  border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
  font-size:1.65rem;box-shadow:0 14px 34px rgba(17,24,39,.22);
}
.logo h1{
  margin-top:14px;font-size:1.32rem;font-weight:800;color:#172033;
}
.logo p{color:#98a2b3;font-size:.78rem;margin-top:3px}

.error-msg{
  background:#fef3f2;border:1px solid #fecdca;
  color:#b42318;border-radius:8px;padding:10px 13px;
  margin-bottom:16px;font-size:.82rem;display:flex;align-items:center;gap:8px;
}

.form-group{margin-bottom:16px}
.form-group label{
  display:block;margin-bottom:5px;
  font-size:.78rem;font-weight:800;color:#344054;
}
.form-control{
  width:100%;background:#fff;
  border:1px solid #d0d5dd;border-radius:8px;
  padding:10px 14px;color:#172033;font-size:.88rem;
  font-family:inherit;transition:all .18s;
}
.form-control:focus{
  outline:none;border-color:#4f46e5;
  box-shadow:0 0 0 4px rgba(79,70,229,.12);background:#fff;
}
.form-control::placeholder{color:#98a2b3}

.btn-login{
  width:100%;padding:12px;border-radius:8px;
  background:#111827;
  color:#fff;border:none;font-size:.92rem;font-weight:700;
  font-family:inherit;cursor:pointer;margin-top:4px;
  transition:all .18s;letter-spacing:.01em;
  box-shadow:0 12px 28px rgba(17,24,39,.18);
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 16px 32px rgba(17,24,39,.22)}
.btn-login:active{transform:translateY(0)}
.btn-login.loading{opacity:.7;cursor:not-allowed}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">🌐</div>
    <h1>Atlas Account</h1>
    <p>پنل مدیریت</p>
  </div>

  {% if error %}
  <div class="error-msg">❌ {{ error }}</div>
  {% endif %}

  <form method="POST" id="loginForm">
    <div class="form-group">
      <label>نام کاربری</label>
      <input type="text" name="username" class="form-control" placeholder="نام کاربری ادمین" required autofocus>
    </div>
    <div class="form-group">
      <label>رمز عبور</label>
      <input type="password" name="password" class="form-control" placeholder="رمز عبور" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">ورود به پنل ←</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit',()=>{
  const b=document.getElementById('loginBtn');
  b.textContent='در حال ورود...'; b.classList.add('loading');
});
</script>
</body>
</html>
